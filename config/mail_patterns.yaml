# メール抽出パターン定義
# 各パターンは正規表現で記述し、named groupで値を取得する

patterns:
  # 注文番号の抽出パターン（複数パターンを上から順に試行）
  order_number:
    - pattern: '注文番号[：:\s]*([A-Za-z0-9\-]+)'
      group: 1
    - pattern: 'オーダー[番号No.]*[：:\s]*([A-Za-z0-9\-]+)'
      group: 1
    - pattern: '受注番号[：:\s]*([A-Za-z0-9\-]+)'
      group: 1

  # 商品コード（ISBN/ASIN）の抽出パターン
  product_code:
    - pattern: 'ISBN[：:\s]*([\d\-]+[\dXx])'
      group: 1
      type: "isbn"
    - pattern: '((?:978|979)[\d\-]{10,13})'
      group: 1
      type: "isbn13"
    - pattern: '(?<!\d)(4\d{8}[\dXx])(?!\d)'
      group: 1
      type: "isbn10"
    - pattern: '(?<!\w)(B[A-Z0-9]{9})(?!\w)'
      group: 1
      type: "asin"

  # 商品名の抽出パターン
  product_name:
    - pattern: '商品[：:][\s]*(.+?)[\r\n]'
      group: 1
    - pattern: '商品名[：:][\s]*(.+?)[\r\n]'
      group: 1
    - pattern: '書名[：:][\s]*(.+?)[\r\n]'
      group: 1
    - pattern: 'タイトル[：:][\s]*(.+?)[\r\n]'
      group: 1

  # 金額の抽出パターン
  amount:
    - pattern: '価格[：:\s]*[¥￥]?\s?([\d,]+)'
      group: 1
    - pattern: '金額[：:\s]*[¥￥]?\s?([\d,]+)'
      group: 1
    - pattern: '単価[：:\s]*[¥￥]?\s?([\d,]+)'
      group: 1
    - pattern: '税込[：:\s]*[¥￥]?\s?([\d,]+)'
      group: 1

  # 数量の抽出パターン
  quantity:
    - pattern: '数量[：:\s]*(\d+)'
      group: 1
    - pattern: '冊数[：:\s]*(\d+)'
      group: 1
    - pattern: '(\d+)\s*冊'
      group: 1

  # コンディションの抽出パターン
  condition:
    - pattern: 'コンディション[：:\s]*(.+?)[\r\n]'
      group: 1

  # 宛先の抽出パターン
  recipient:
    - pattern: '宛先[：:\s]*(.+?)[\r\n]'
      group: 1

  # 版本の抽出パターン（商品名の [単行本] 等から抽出）
  edition:
    - pattern: '\[([^\]]*本[^\]]*)\]'
      group: 1
    - pattern: '\[(文庫)\]'
      group: 1
    - pattern: '\[(新書)\]'
      group: 1

  # 出版年度の抽出パターン（商品名の [2024] 等から抽出）
  pub_year:
    - pattern: '\[(\d{4})\]'
      group: 1

  # 著者の抽出パターン（商品名の最後の部分から抽出）
  author:
    - pattern: '\[\d{4}\]\s*(.+?)[\r\n]'
      group: 1

  # SKUの抽出パターン
  sku:
    - pattern: 'SKU[：:\s]*([A-Za-z0-9\-]+)'
      group: 1

  # 注文日の抽出パターン
  order_date:
    - pattern: '注文日[：:\s]*(\d{4}/\d{2}/\d{2})'
      group: 1

  # 出荷予定日の抽出パターン
  ship_date:
    - pattern: '出荷予定日[：:\s]*(\d{4}/\d{2}/\d{2})'
      group: 1

  # 税金の抽出パターン
  tax:
    - pattern: '税金[：:\s]*[¥￥]?\s?([\d,]+)'
      group: 1

  # 配送料の抽出パターン
  shipping:
    - pattern: '配送[：:\s]*[¥￥]?\s?([\d,]+)'
      group: 1

# 商品行の区切りパターン（1メール複数商品対応）
item_separator:
  patterns:
    - '[-─]{3,}'
    - '商品\d+'
    - '■商品情報'

# デフォルト値
defaults:
  quantity: 1
